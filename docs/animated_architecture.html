<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated System Architecture</title>
    <style>
        body {
            background-color: #1a1a2e;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        h1 {
            margin-bottom: 50px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
        .architecture-container {
            position: relative;
            width: 1000px;
            height: 500px;
        }
        .node {
            position: absolute;
            padding: 20px 30px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            text-align: center;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            z-index: 2;
            transition: transform 0.3s ease;
        }
        .node:hover {
            transform: scale(1.1);
        }
        .node-android { top: 350px; left: 50px; background: linear-gradient(135deg, #3DDC84, #1eb761); }
        .node-ai { top: 50px; left: 50px; background: linear-gradient(135deg, #AB68FF, #7834d8); }
        .node-mcp { top: 50px; left: 350px; background: linear-gradient(135deg, #FF5722, #d84315); }
        .node-bridge { top: 200px; left: 530px; background: linear-gradient(135deg, #777BB4, #505591); }
        .node-api { top: 350px; left: 350px; background: linear-gradient(135deg, #777BB4, #505591); }
        .node-db { top: 200px; left: 850px; background: linear-gradient(135deg, #F29111, #c87400); transform: translateX(-50%); }

        .line {
            position: absolute;
            background-color: #4a4e69;
            z-index: 1;
            transform-origin: 0 50%;
        }
        
        /* Specific lines */
        .line-ai-mcp { top: 80px; left: 200px; width: 150px; height: 4px; }
        .line-mcp-bridge { top: 90px; left: 470px; width: 220px; height: 4px; transform: rotate(26deg); }
        .line-bridge-db { top: 230px; left: 660px; width: 140px; height: 4px; }
        .line-android-api { top: 380px; left: 230px; width: 120px; height: 4px; }
        .line-api-db { top: 380px; left: 440px; width: 400px; height: 4px; transform: rotate(-22deg); }

        .packet {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #fff;
            box-shadow: 0 0 10px #fff, 0 0 20px #fff;
            z-index: 3;
            opacity: 0;
        }

        /* Animations (Bidirectional) */
        @keyframes move-ai-mcp {
            0% { top: 74px; left: 200px; opacity: 1; background-color: #fff; }
            40% { top: 74px; left: 350px; opacity: 1; background-color: #fff; }
            60% { top: 74px; left: 350px; opacity: 1; background-color: #fde047; }
            100% { top: 74px; left: 200px; opacity: 1; background-color: #fde047; }
        }
        @keyframes move-mcp-bridge {
            0% { top: 84px; left: 470px; opacity: 1; background-color: #fff; }
            40% { top: 194px; left: 640px; opacity: 1; background-color: #fff; }
            60% { top: 194px; left: 640px; opacity: 1; background-color: #fde047; }
            100% { top: 84px; left: 470px; opacity: 1; background-color: #fde047; }
        }
        @keyframes move-bridge-db {
            0% { top: 224px; left: 660px; opacity: 1; background-color: #fff; }
            40% { top: 224px; left: 820px; opacity: 1; background-color: #fff; }
            60% { top: 224px; left: 820px; opacity: 1; background-color: #fde047; }
            100% { top: 224px; left: 660px; opacity: 1; background-color: #fde047; }
        }

        @keyframes move-android-api {
            0% { top: 374px; left: 230px; opacity: 1; background-color: #3DDC84;}
            40% { top: 374px; left: 350px; opacity: 1; background-color: #3DDC84;}
            60% { top: 374px; left: 350px; opacity: 1; background-color: #38bdf8;}
            100% { top: 374px; left: 230px; opacity: 1; background-color: #38bdf8;}
        }
        @keyframes move-api-db {
            0% { top: 374px; left: 440px; opacity: 1; background-color: #3DDC84; }
            40% { top: 214px; left: 800px; opacity: 1; background-color: #3DDC84; }
            60% { top: 214px; left: 800px; opacity: 1; background-color: #38bdf8; }
            100% { top: 374px; left: 440px; opacity: 1; background-color: #38bdf8; }
        }

        .p1 { animation: move-ai-mcp 3s infinite ease-in-out; }
        .p2 { animation: move-mcp-bridge 3s infinite ease-in-out; animation-delay: 0.5s; }
        .p3 { animation: move-bridge-db 1.5s infinite ease-in-out; animation-delay: 1.5s; }
        
        .p4 { animation: move-android-api 3s infinite ease-in-out; animation-delay: 0.2s; }
        .p5 { animation: move-api-db 4s infinite ease-in-out; animation-delay: 1.5s; }

        .zone {
            position: absolute;
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 16px;
            padding: 10px;
            color: rgba(255,255,255,0.4);
            font-weight: bold;
            z-index: 0;
        }
        .zone-local { top: 10px; left: 20px; width: 450px; height: 120px; }
        .zone-remote { top: 160px; left: 300px; width: 620px; height: 280px; }
    </style>
</head>
<body>

    <h1>🌐 Dynamic UI Architecture (Live Flow)</h1>

    <div class="architecture-container">
        <!-- Zones -->
        <div class="zone zone-local">💻 Local Laptop</div>
        <div class="zone zone-remote">☁️ Remote Server (missiongiveback.in)</div>

        <!-- Lines connecting nodes -->
        <div class="line line-ai-mcp"></div>
        <div class="line line-mcp-bridge"></div>
        <div class="line line-bridge-db"></div>
        <div class="line line-android-api"></div>
        <div class="line line-api-db"></div>

        <!-- Animated Packets (Developer Flow) -->
        <div class="packet p1"></div>
        <div class="packet p2"></div>
        <div class="packet p3"></div>

        <!-- Animated Packets (User Flow) -->
        <div class="packet p4"></div>
        <div class="packet p5"></div>

        <!-- Nodes -->
        <div class="node node-ai">🤖 AI Client<br/><small>(Copilot)</small></div>
        <div class="node node-mcp">🔌 MCP Server<br/><small>(Node.js)</small></div>
        
        <div class="node node-android">📱 Android App<br/><small>(SDUI)</small></div>
        <div class="node node-api">⚙️ PHP API<br/><small>(screen.php)</small></div>
        
        <div class="node node-bridge">🌉 PHP Bridge<br/><small>(mcp_bridge.php)</small></div>
        
        <div class="node node-db">🗄️ MySQL<br/>Database</div>
    </div>

</body>
</html>
